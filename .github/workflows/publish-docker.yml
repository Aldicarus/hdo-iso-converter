name: Publish Docker image to GHCR

# Trigger en release.published (no en push de tag) para que el body de la
# release este disponible al construir y se pueda embeber como description
# del package en GHCR. Flujo: tag + push + gh release create --notes ... →
# release.published event → este workflow corre con notas en context.
on:
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tag and notes
        id: rel
        run: |
          # Para release.published: usar tag_name + body de la release.
          # Para workflow_dispatch: usar el ref/SHA actuales y notas vacías.
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            # body puede ser multi-linea; lo escribimos a fichero para evitar
            # problemas de escape en el output del step.
            cat > /tmp/release_body.txt <<'BODY_EOF'
          ${{ github.event.release.body }}
          BODY_EOF
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            : > /tmp/release_body.txt
          fi
          # Description para el OCI label. CRÍTICO: truncar a nivel de
          # CARÁCTER (no de byte) — `head -c` corta por bytes y rompe
          # emojis multi-byte UTF-8 (4 bytes c/u) a mitad de carácter,
          # produciendo bytes inválidos que GHCR rechaza con 500 al
          # PUT del manifest. Caso real: release v2.5.0 con muchos
          # emojis (💿 📺 ✨ 🎬 …) que rompió el push 3 veces seguidas
          # hasta que se trigger via workflow_dispatch (sin body).
          # `cut -c` y similar parsean caracteres en POSIX C, no UTF-8.
          # Usamos awk con setlocale para garantizar truncado seguro.
          DESC=$(awk 'BEGIN{n=0} { for(i=1;i<=length($0);i++){ c=substr($0,i,1); printf "%s",c; if(++n>=800){exit} }; printf " " }' /tmp/release_body.txt | sed 's/  */ /g')
          if [ -z "$DESC" ]; then
            DESC="HDO ISO Converter — UHD Blu-ray ISO to MKV with DV FEL, in-place MKV editing, Dolby Vision CMv4.0 upgrade"
          fi
          # Multi-line outputs: usar delimiter syntax
          {
            echo "description<<EOF"
            echo "$DESC"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.rel.outputs.tag }}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest
          # Override defaults: el label description usa nuestras notas en
          # vez de la descripcion del repo.
          labels: |
            org.opencontainers.image.description=${{ steps.rel.outputs.description }}
            org.opencontainers.image.title=HDO ISO Converter
            org.opencontainers.image.version=${{ steps.rel.outputs.tag }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Bypass del annotation auto-gen del metadata-action (siempre
          # forzaba la repo description). Pasamos annotations explicitas
          # al build-push-action — gana lo ultimo definido.
          annotations: |
            manifest:org.opencontainers.image.description=${{ steps.rel.outputs.description }}
            manifest:org.opencontainers.image.title=HDO ISO Converter
            manifest:org.opencontainers.image.version=${{ steps.rel.outputs.tag }}
            manifest:org.opencontainers.image.source=https://github.com/Aldicarus/hdo-iso-converter
          # Bake version y commit en la imagen para que /api/version
          # reporte el tag real en vez de 'dev / unknown'.
          build-args: |
            APP_VERSION=${{ steps.rel.outputs.tag }}
            APP_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update GHCR package description
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # El campo "description" del package (nivel package, no version) lo
          # actualizamos via API. Esto es lo que se ve grande en la pagina del
          # package. Usa el body completo de la release (markdown se renderiza).
          BODY=$(cat /tmp/release_body.txt)
          # Escapamos via jq para JSON safe
          PAYLOAD=$(jq -n --arg desc "$BODY" '{description: $desc}')
          # Endpoint user packages (Aldicarus es user, no org)
          curl -sf -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/user/packages/container/hdo-iso-converter" \
            -d "$PAYLOAD" || echo "⚠ No se pudo actualizar la description del package (puede requerir PAT clásico con scope write:packages, no GITHUB_TOKEN)"
