# docker-compose.yml — usa la imagen pre-construida de GHCR.
#
# Para usar este compose tal cual:
#   1. Copia este fichero + .env.example al host (no hace falta clonar el repo)
#   2. Renombra .env.example a .env y edita las rutas
#   3. docker compose pull && docker compose up -d
#
# Para BUILD desde código fuente (devs), usar docker-compose.dev.yml en su
# lugar — incluye la directiva `build:` apuntando al Dockerfile local.
#
# Imagen oficial: https://github.com/Aldicarus/hdo-iso-converter/pkgs/container/hdo-iso-converter

services:
  hdo-iso-converter:
    image: ghcr.io/aldicarus/hdo-iso-converter:latest
    container_name: hdo-iso-converter
    hostname: hdo-iso-converter
    restart: unless-stopped

    # Necesario para: mount -t udf -o ro,loop (ISOs UHD Blu-ray UDF 2.50)
    privileged: true

    ports:
      - "${HDO_PORT:-8090}:8080"

    environment:
      - TZ=${TZ:-Europe/Madrid}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    volumes:
      # ISOs de origen (solo lectura)
      - ${ISOS_PATH:?Define ISOS_PATH en .env}:/mnt/isos:ro

      # Biblioteca de MKVs (raíz con subdirectorios) — read-only. Tabs 2 y 3
      # navegan este árbol con un file browser. Si LIBRARY_PATH no se define,
      # se usa /var/empty como dir vacío (los tabs solo verán /mnt/output).
      - ${LIBRARY_PATH:-/var/empty}:/mnt/library:ro

      # MKVs finales
      - ${OUTPUT_PATH:?Define OUTPUT_PATH en .env}:/mnt/output:rw

      # MKV intermedios + workdir CMv4.0 (SSD recomendado)
      - ${TMP_PATH:?Define TMP_PATH en .env}:/mnt/tmp:rw

      # Sesiones persistentes + cola + app_settings.json (API keys)
      - ${CONFIG_PATH:?Define CONFIG_PATH en .env}:/config:rw

      # RPUs CMv4.0 externos legacy (read-only, Tab 3).
      # OBLIGATORIO: si no usas esta funcionalidad, apunta a un dir vacío cualquiera.
      # NUNCA dejar fallback a /tmp — en QNAP el tmpfs vuelca basura del sistema
      # (.qcloud*, smart/, sockets) que aparecerían como ficheros RPU en la UI.
      - ${CMV40_RPU_PATH:?Define CMV40_RPU_PATH en .env (apunta a un dir vacio si no usas Tab 3 con RPUs externos)}:/mnt/cmv40_rpus:ro
