# docker-compose.dev.yml — build local desde el código fuente.
#
# Solo necesario para devs que quieran modificar el código. End users
# normalmente usan docker-compose.yml (imagen pre-construida de GHCR).
#
#   docker compose -f docker-compose.dev.yml up -d --build
#
# Hereda toda la config del docker-compose.yml principal y solo añade
# la directiva `build:` apuntando al Dockerfile local. La directiva
# `image:` sigue ahí para que la build se etiquete con el mismo tag
# que la oficial — útil para probar cambios sin pisar la imagen pull.

services:
  hdo-iso-converter:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        DOVI_TOOL_VERSION: "2.3.2"
    image: ghcr.io/aldicarus/hdo-iso-converter:latest
    container_name: hdo-iso-converter
    hostname: hdo-iso-converter
    restart: unless-stopped

    privileged: true

    ports:
      - "${HDO_PORT:-8090}:8080"

    environment:
      - TZ=${TZ:-Europe/Madrid}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    volumes:
      - ${ISOS_PATH:?Define ISOS_PATH en .env}:/mnt/isos:ro
      - ${LIBRARY_PATH:-/var/empty}:/mnt/library:ro
      - ${OUTPUT_PATH:?Define OUTPUT_PATH en .env}:/mnt/output:rw
      - ${TMP_PATH:?Define TMP_PATH en .env}:/mnt/tmp:rw
      - ${CONFIG_PATH:?Define CONFIG_PATH en .env}:/config:rw
      - ${CMV40_RPU_PATH:?Define CMV40_RPU_PATH en .env}:/mnt/cmv40_rpus:ro
